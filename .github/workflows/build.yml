#credit goes to https://github.com/cpguy5089/AmongUsMenu_Ghost/blob/main/.github/workflows/build.yml
name: Build Project

on:
  push:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  Build_Release:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Release
        shell: bash
        run: '"C:/Program Files/Microsoft Visual Studio/2022/Enterprise/Msbuild/Current/Bin/MSBuild.exe" -property:Configuration=Release -property:PlatformToolset=v143 -fl -flp:logfile=build_errors_Release.log;errorsonly'
        
      - name: Build Release_Version
        shell: bash
        run: '"C:/Program Files/Microsoft Visual Studio/2022/Enterprise/Msbuild/Current/Bin/MSBuild.exe" -property:Configuration=Release_Version -property:PlatformToolset=v143 -fl -flp:logfile=build_errors_Release.log;errorsonly;append'

      - name: Commit and Push Logs
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f build_errors_Release.log
          git commit -m "Automated log update [skip ci]" || echo "No changes to commit"
          git pull --autostash --rebase
          git push
        
      - name: Package Release Builds
        shell: cmd
        run: |
          move /y Release\SickoMenu.dll SickoMenu.dll
          move /y Release_Version\version.dll version.dll
          tar -caf Release.zip SickoMenu.dll version.dll LICENSE
        
      - name: Upload Release Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Release
          path: |
            Release.zip
            build_errors_Release.log
          
  Build_Debug:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Debug
        shell: bash
        run: '"C:/Program Files/Microsoft Visual Studio/2022/Enterprise/Msbuild/Current/Bin/MSBuild.exe" -property:Configuration=Debug -property:PlatformToolset=v143 -fl -flp:logfile=build_errors_Debug.log;errorsonly'
        
      - name: Build Debug_Version
        shell: bash
        run: '"C:/Program Files/Microsoft Visual Studio/2022/Enterprise/Msbuild/Current/Bin/MSBuild.exe" -property:Configuration=Debug_Version -property:PlatformToolset=v143 -fl -flp:logfile=build_errors_Debug.log;errorsonly;append'

      - name: Commit and Push Logs
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f build_errors_Debug.log
          git commit -m "Automated log update [skip ci]" || echo "No changes to commit"
          git pull --rebase
          git push
        
      - name: Package Debug Builds
        shell: cmd
        run: |
          move /y Debug\SickoMenu.dll SickoMenu.dll
          move /y Debug_Version\version.dll version.dll
          tar -caf Debug.zip SickoMenu.dll version.dll LICENSE
        
      - name: Upload Debug Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Debug
          path: |
            Debug.zip
            build_errors_Debug.log
          
  AutoRelease:
    runs-on: windows-2022
    needs: [Build_Release, Build_Debug]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Release Artifact
        uses: actions/download-artifact@v4
        with:
          name: Release
      
      - name: Download Debug Artifact
        uses: actions/download-artifact@v4
        with:
          name: Debug
      
      - name: Automatic Releases
        uses: marvinpinto/action-automatic-releases@latest
        id: "automatic_releases"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: false
          files: |
            Release.zip
            Debug.zip
            build_errors_Release.log
            build_errors_Debug.log
